<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bakery</title>

<style>
body{
font-family:sans-serif;
background:#111827;
color:white;
margin:0;
padding:20px;
}

h1{
text-align:center;
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
}

.card{
background:#1f2937;
border-radius:12px;
padding:10px;
text-align:center;
}

.card img{
width:100%;
border-radius:10px;
height:160px;
object-fit:cover;
}

.price{
color:#22c55e;
font-weight:bold;
margin-top:5px;
}
</style>
</head>

<body>

<h1>Bakery Items</h1>

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1608198093002-ad4e005484ec" alt="Madeira">
<p>Madeira (Twin)</p>
<p class="price">£1.30</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1558961363-fa8fdf82db35" alt="Slices">
<p>All Slices</p>
<p class="price">£1.30</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1499636136210-6f4ee915583e" alt="Biscuits">
<p>Biscuits</p>
<p class="price">£1.80</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1509440159596-0249088772ff" alt="Maderas">
<p>Maderas</p>
<p class="price">£1.80</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1551024601-bec78aea704b" alt="Cream Roll">
<p>Cream Roll</p>
<p class="price">£1.30</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1587248720327-8eb72564be1e" alt="Namak Pari">
<p>Namak Pari</p>
<p class="price">£1.80</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1563729784474-d77dbb933a9e" alt="Cake Rusk Big">
<p>Cake Rusk (Big)</p>
<p class="price">£2.75</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1505250469679-203ad9ced0cb" alt="Bom Mary">
<p>Bom Mary</p>
<p class="price">£1.30</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1578985545062-69928b1d9587" alt="18 Cake Rusk">
<p>18 Cake Rusk</p>
<p class="price">£2.20</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1559620192-032c4bc4674e" alt="Lush Cake">
<p>Lush Cake</p>
<p class="price">£3.25</p>
</div>

</div>

</body>
</html>
